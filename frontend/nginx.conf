# Preserve the scheme the *client* used. Caddy terminates TLS and forwards X-Forwarded-Proto=https;
# overwriting it with $scheme here would tell the backend "http" (nginx listens on plain 80 inside
# the network) and send UseHttpsRedirection into a redirect loop. Falls back to $scheme when no
# upstream proxy set the header (e.g. running this container directly in local dev).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Disable nginx version in headers
    server_tokens off;

    # API proxy — forward all /api/* and /hangfire/* to backend
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;

        # Required for SSE (POST /api/words/format)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    location /hangfire/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
