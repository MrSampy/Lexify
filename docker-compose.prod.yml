# Production stack ‚Äî this is the file that lives on the VPS at /opt/lexify/docker-compose.yml.
#
# It differs from the dev docker-compose.yml in three ways:
#   1. backend/frontend are PULLED from ghcr.io (image:) instead of built locally (build:) ‚Äî the
#      deploy workflow pushes them, the server only pulls.
#   2. Caddy sits in front and is the only service bound to host ports (80/443), terminating TLS.
#      frontend/backend are reachable only on the internal network.
#   3. Secrets come from .env next to this file (never committed). See .env.example.
#
# Usage on the server:  docker compose pull && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexify
      POSTGRES_USER: lexify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexify -d lexify"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/mrsampy/lexify/backend:latest
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DATABASE_URL:?DATABASE_URL is required}
      - ConnectionStrings__Redis=${REDIS_URL:?REDIS_URL is required}
      - Hangfire__ConnectionString=${DATABASE_URL}

      # Refused at boot if weak/dev ‚Äî see the production guard in Program.cs
      - Jwt__SecretKey=${JWT_SECRET:?JWT_SECRET is required}
      - Jwt__Issuer=${JWT_ISSUER:-lexify}
      - Jwt__Audience=${JWT_AUDIENCE:-lexify}
      - Jwt__AccessTokenExpiryMinutes=${JWT_ACCESS_EXPIRY_MINUTES:-15}
      - Jwt__RefreshTokenExpiryDays=${JWT_REFRESH_EXPIRY_DAYS:-30}

      # Seeded on first boot only (DataSeeder skips if the user already exists)
      - Admin__Email=${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      - Admin__Password=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - Admin__DisplayName=${ADMIN_DISPLAY_NAME:-Admin}

      # Used for links in outgoing emails (password reset, welcome)
      - Frontend__Url=https://${DOMAIN:?DOMAIN is required}

      # Transactional email ‚Äî without this, password reset and welcome mail silently fail
      - Smtp__Host=${SMTP_HOST:?SMTP_HOST is required}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__UseSsl=${SMTP_USE_SSL:-true}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromAddress=${SMTP_FROM_ADDRESS:-noreply@lexify.app}
      - Smtp__FromName=${SMTP_FROM_NAME:-Lexify}

      - AiProviders__0__Name=Ollama
      - AiProviders__0__BaseUrl=https://ollama.com
      - AiProviders__0__Model=${OLLAMA_MODEL:-gemma3:27b}
      - AiProviders__0__ApiKey=${OLLAMA_API_KEY:?OLLAMA_API_KEY is required}
      - AiProviders__0__TimeoutSeconds=180
      - AiProviders__0__SupportsJsonSchema=false

      # Server-side neural TTS (Piper). Runtime on/off is the features.tts_enabled setting.
      - Piper__Enabled=${PIPER_ENABLED:-true}
      - Piper__BaseUrl=${PIPER_BASE_URL:-http://piper:5000}
      - Piper__CacheDir=/app/tts-cache

      # Read-only view of the postgres-backup volume, so the admin dashboard can show backup age
      - Backups__Path=/backups
    volumes:
      - tts_cache:/app/tts-cache
      - pgbackups:/backups:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # No health gate: a TTS outage must not block backend startup (client falls back to browser TTS).
      piper:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  piper:
    image: ghcr.io/mrsampy/lexify/piper:latest
    restart: unless-stopped
    # No host ports ‚Äî reachable only on the internal network via http://piper:5000.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/voices"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/mrsampy/lexify/frontend:latest
    restart: unless-stopped
    # No host ports ‚Äî Caddy is the only public entrypoint.
    depends_on:
      backend:
        condition: service_healthy

  # ‚îÄ‚îÄ Backups ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Two stages on purpose: local dumps are fast to restore from, offsite copies survive losing the
  # VPS itself. A backup that only exists on the machine it protects is not a backup.

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=lexify
      - POSTGRES_USER=lexify
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=${BACKUP_SCHEDULE:-@daily}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-7}
      - BACKUP_KEEP_WEEKS=${BACKUP_KEEP_WEEKS:-4}
      - BACKUP_KEEP_MONTHS=${BACKUP_KEEP_MONTHS:-6}
      - HEALTHCHECK_PORT=8080
    volumes:
      - pgbackups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # Ships the dump directory offsite. Runs on its own schedule, after the dump has landed.
  backup-offsite:
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      - BACKUP_CRON_EXPRESSION=${BACKUP_OFFSITE_CRON:-0 4 * * *}
      - BACKUP_FILENAME=lexify-%Y%m%d-%H%M%S.tar.gz
      - BACKUP_RETENTION_DAYS=${BACKUP_OFFSITE_RETENTION_DAYS:-30}
      - AWS_ENDPOINT=${S3_ENDPOINT:?S3_ENDPOINT is required}
      - AWS_S3_BUCKET_NAME=${S3_BUCKET:?S3_BUCKET is required}
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    volumes:
      - pgbackups:/backup/pgbackups:ro
      # Lets the container stop/start others around a backup; not used here, but the image expects it.
      - /var/run/docker.sock:/var/run/docker.sock:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL:?ACME_EMAIL is required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certificates ‚Äî losing this volume means re-issuing certs
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  redis_data:
  pgbackups:
  caddy_data:
  caddy_config:
  tts_cache:
