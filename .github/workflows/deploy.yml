name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BACKEND=${REPO_LC}/backend" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=${REPO_LC}/frontend" >> $GITHUB_ENV
          echo "IMAGE_PIPER=${REPO_LC}/piper" >> $GITHUB_ENV

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # VITE_API_URL is deliberately NOT passed: with it unset the axios client falls back to
      # relative /api/... URLs, which nginx proxies to the backend on the same origin. That keeps
      # the image domain-agnostic — no rebuild needed when the domain changes.
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Piper TTS sidecar — voices are baked in, so this image is large but rebuilds rarely.
      - name: Build and push piper
        uses: docker/build-push-action@v6
        with:
          context: ./piper
          file: ./piper/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PIPER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    # The `secrets` context is NOT available in a job-level `if` — using it there makes the whole
    # workflow fail to compile (0s run, no jobs, build-and-push never executes either). Hoisting the
    # secret into `env` and testing that in step-level `if` is the supported way to skip deployment
    # on forks/clones where DEPLOY_HOST was never configured.
    env:
      DEPLOY_CONFIGURED: ${{ secrets.DEPLOY_HOST != '' }}

    steps:
      - uses: actions/checkout@v4
        if: env.DEPLOY_CONFIGURED == 'true'

      # Ship the stack definition itself, so the server never drifts from the repo.
      # `.env` (all secrets) lives only on the server and is never copied or overwritten.
      - name: Copy compose stack to server
        if: env.DEPLOY_CONFIGURED == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /opt/lexify
          overwrite: true

      - name: Deploy via SSH
        if: env.DEPLOY_CONFIGURED == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/lexify
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
